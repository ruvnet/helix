[package]
name = "helix-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "WASM binding exposing the Helix analytic pipeline to the web/mobile UI"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
wasm-bindgen = "0.2"
helix-provenance = { path = "../helix-provenance", version = "0.1.0" }
helix-numeric = { path = "../helix-numeric", version = "0.1.0" }
helix-evidence = { path = "../helix-evidence", version = "0.1.0" }
helix-escalation = { path = "../helix-escalation", version = "0.1.0" }
helix-ontology = { path = "../helix-ontology", version = "0.1.0" }
helix-pipeline = { path = "../helix-pipeline", version = "0.1.0" }
helix-score = { path = "../helix-score", version = "0.1.0" }
helix-neural = { path = "../helix-neural", version = "0.1.0" }
helix-sensing = { path = "../helix-sensing", version = "0.1.0" }
helix-genome = { path = "../helix-genome", version = "0.1.0" }
helix-ocr = { path = "../helix-ocr", version = "0.1.0" }
helix-bioage = { path = "../helix-bioage", version = "0.1.0" }
helix-focus = { path = "../helix-focus", version = "0.1.0" }
helix-timeline = { path = "../helix-timeline", version = "0.1.0" }

[dev-dependencies]
wasm-bindgen-test = "0.3"
